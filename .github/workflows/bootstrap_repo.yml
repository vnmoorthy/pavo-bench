# Bootstrap workflow. Description, topics, homepage, v1.0.0 release,
# vnmoorthy/vnmoorthy profile README, GitHub Discussions, and the seed issues
# were all applied during initial bootstrap and persist in GitHub's state.
# This workflow is retained as a manual-dispatch no-op.
name: bootstrap-extras

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Bootstrap already applied."
          echo "scripts/apply_github_metadata.sh re-applies repo About metadata."
