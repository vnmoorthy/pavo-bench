# Bootstrap workflow. The v1.0.0 release, repo description, topics, homepage,
# and the vnmoorthy/vnmoorthy profile README were applied during initial
# bootstrap and persist in GitHub's state. This workflow is retained as a
# manual-dispatch no-op so the filename is stable for future re-applications.
name: bootstrap-profile

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Bootstrap already applied."
          echo "See scripts/apply_github_metadata.sh to re-apply repo About metadata"
          echo "with any PAT that has repo scope."
